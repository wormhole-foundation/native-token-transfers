name: Publish TS SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: "string"

jobs:
  publish-ts-sdk:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication with npm
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.11.0
          registry-url: "https://registry.npmjs.org"
          # Node required for npm publish with OIDC (npm CLI 11.5.1+)
      - run: bun ci
      - run: bun run version ${INPUTS_VERSION}
        env:
          INPUTS_VERSION: ${{ inputs.version }}
      - run: bun --if-present run build
      - run: bun run test
      - run: |
          if [[ $VERSION == *"beta"* ]]; then
            tag=beta
          elif [[ $VERSION == *"alpha"* ]]; then
            tag=alpha
          else
            tag=latest
          fi

          npm publish --access public --tag $tag \
            --workspace sdk/definitions \
            --workspace evm/ts \
            --workspace xrpl/ts \
            --workspace solana \
            --workspace sui \
            --workspace sdk/route
        # OIDC authentication is used automatically by npm CLI 11.5.1+
        # No NPM_TOKEN secret needed - authentication happens via OpenID Connect
        # See: https://docs.npmjs.com/trusted-publishers/
        env:
          VERSION: ${{ inputs.version }}
