name: TS SDK CI
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "sdk/**"
      - "evm/ts/**"
      - "solana/ts/**"
      - "sui/ts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - ".github/workflows/sdk.yml"
  push:
    branches:
      - main
    paths:
      - "sdk/**"
      - "evm/ts/**"
      - "solana/ts/**"
      - "sui/ts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - ".github/workflows/sdk.yml"

# Cancel in-progress runs on new commits to same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-sdk-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun ci
      - run: bun --if-present run build
      - run: bun run test
