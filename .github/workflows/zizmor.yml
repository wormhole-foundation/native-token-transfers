name: Zizmor

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          min-confidence: medium
          # TODO: Harden tilt.yml and tilt-images.yml in a dedicated PR. Those
          # workflows push GHCR images, so modifying them here makes PR checks
          # run with package read-only permissions and breaks their current flow.
          inputs: >-
            .github/workflows/anchor-base.yml
            .github/workflows/claude.yml
            .github/workflows/cli.yml
            .github/workflows/evm.yml
            .github/workflows/prettier.yml
            .github/workflows/publish.yml
            .github/workflows/sdk.yml
            .github/workflows/solana.yml
            .github/workflows/zizmor.yml
            .github/actions/setup-anchor/action.yml
            .github/dependabot.yml
